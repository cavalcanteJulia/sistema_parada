<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RCP PRO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🚑 RCP PRO</h1>

<div class="painel">
  <div class="botoes-grid">
    <button class="btn red" onclick="iniciarParada()">🚨 Parada</button>
    <button class="btn green" onclick="iniciarRCP()">▶ RCP</button>
    <button class="btn gray" onclick="pararRCP()">⏹ Parar</button>
    <button class="btn blue" onclick="registrarROSC()">💓 ROSC</button>
  </div>

  <h2 id="tempo">00:00</h2>
  <p id="ciclo">Ciclo: 0</p>
</div>

<div class="acoes">
  <h3>💉 Medicação</h3>
  <input id="medNome" placeholder="Medicamento">
  <input id="medDose" placeholder="Dose">
  <input id="medUser" placeholder="Usuário">
  <button onclick="registrarMedicacao()">Registrar</button>

  <h3>⚡ Choque</h3>
  <input id="joules" type="number" placeholder="Joules">
  <button onclick="registrarChoque()">Aplicar</button>
</div>

<h3>📋 Timeline</h3>
<ul id="log"></ul>

<button class="relatorio" onclick="gerarRelatorio()">📊 Gerar Relatório</button>

<script src="script.js"></script>
</body>
</html>
